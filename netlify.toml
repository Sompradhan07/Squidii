# Netlify build configuration for the Nura Next.js app.
# The official Next.js runtime (@netlify/plugin-nextjs) is auto-installed by
# Netlify when it detects Next.js — no need to list it here.

[build]
  command = "next build"
  publish = ".next"

[build.environment]
  # Next.js 16 requires Node >= 20.9; pin a current LTS-class runtime.
  NODE_VERSION = "22"
